<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BAGASS - Season Two</title>

<style>
body{
    margin:0;
    background:#111;
    font-family:Arial,Helvetica,sans-serif;
    color:white;
}

header{
    text-align:center;
    padding:40px 20px;
}

header h1{
    font-size:3rem;
    color:#ff4db8;
    margin:0;
}

header p{
    color:#ccc;
}

.gallery{
    max-width:1500px;
    margin:auto;
    padding:20px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:25px;
}

.card{
    background:#1d1d1d;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 0 20px rgba(255,0,140,.25);
    transition:.25s;
}

.card:hover{
    transform:translateY(-6px);
}

.card img{
    width:100%;
    display:block;
}
</style>
</head>

<body>

<header>
<h1>BAGASS</h1>
<p>Board And Game Association of Sexy Salopians</p>
<p>Season Two Player Profiles</p>
</header>

<div class="gallery">

<div class="card">
<img src="images/tom.png" alt="Tom">
</div>

<div class="card">
<img src="images/paul.png" alt="Paul">
</div>

<div class="card">
<img src="images/jake.png" alt="Jake">
</div>

<div class="card">
<img src="images/rachel.png" alt="Rachel">
</div>

<div class="card">
<img src="images/stacey.png" alt="Stacey">
</div>

<div class="card">
<img src="images/sarah.png" alt="Sarah">
</div>

</div>

</body>
</html>
