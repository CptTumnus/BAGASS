<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>PAUL.EXE</title>

    <link rel="stylesheet" href="paul-exe.css">

</head>

<body>

    <!-- ==========================================
         LOADING SCREEN
    =========================================== -->

    <div id="loadingScreen" class="loading">

        <h1>PAUL.EXE</h1>

        <div class="status">

            Loading Champion...

        </div>

        <div class="bar">

            <div class="fill" id="fill"></div>

        </div>

        <div id="percent">

            0%

        </div>

    </div>

    <!-- ==========================================
         MAIN MENU
    =========================================== -->

    <div id="mainMenu">

        <h1>⚠ PAUL.EXE ⚠</h1>

        <h2>Containment Breached</h2>

        <p>The Champion has escaped...</p>

        <div class="menu-buttons">

            <button id="cloneButton">
                🧬 CLONE PAUL
            </button>

            <button id="fireworksButton">
                🎆 FIREWORKS
            </button>

            <button id="airhornButton">
                📯 AIRHORN
            </button>

            <button id="slotButton">
                🎰 RIGGED SLOT MACHINE
            </button>

            <button id="gameButton">
                🎮 CATCH PAUL
            </button>

            <button id="returnButton">
                ⬅ RETURN TO REALITY
            </button>

        </div>

    </div>

    <script src="paul-exe.js"></script>

</body>

</html>
