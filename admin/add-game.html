<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <script src="admin-auth.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#12091f">
  <title>Add New Game — BAGASS Admin</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <header class="admin-header">
    <p class="eyebrow">BAGASS Admin</p>
    <h1>Add New Game</h1>
  </header>

  <main class="admin-main section-shell">
    <section class="admin-card">
      <h2>Game Details</h2>
      <form id="addGameForm" class="admin-form">
        <label for="gameName">Game name</label>
        <input type="text" id="gameName" name="gameName" required>

        <label for="minPlayers">Min players</label>
        <input type="number" id="minPlayers" name="minPlayers" min="1" step="1">

        <label for="maxPlayers">Max players</label>
        <input type="number" id="maxPlayers" name="maxPlayers" min="1" step="1">

        <label for="playTimeMinutes">Play time (minutes)</label>
        <input type="number" id="playTimeMinutes" name="playTimeMinutes" min="1" step="1">

        <button class="primary-button" type="submit">Add Game</button>
        <p id="addGameError" class="admin-error" hidden></p>
        <p id="addGameSuccess" class="admin-success" hidden></p>
      </form>
    </section>
  </main>

  <footer><a href="index.html">Back to admin actions</a></footer>

  <script src="add-game.js"></script>
</body>
</html>
