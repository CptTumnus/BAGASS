<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#12091f">
  <title>BAGASS Admin</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <header class="admin-header">
    <p class="eyebrow">BAGASS Championship</p>
    <h1>Admin</h1>
  </header>

  <main class="admin-main section-shell">
    <section id="loginView" class="admin-card" hidden>
      <h2>Admin Login</h2>
      <form id="loginForm" class="admin-form">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autocomplete="username" required>
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required>
        <button class="primary-button" type="submit">Log in</button>
        <p id="loginError" class="admin-error" hidden></p>
      </form>
    </section>

    <section id="actionsView" class="admin-card" hidden>
      <h2>Admin Actions</h2>
      <nav class="admin-actions">
        <a href="add-game.html">Add new game to library</a>
        <a href="add-results.html">Add game results</a>
        <a href="update-results.html">Update game results</a>
        <a href="new-season.html">Start new BAGASS season</a>
      </nav>
      <button id="logoutButton" class="admin-logout" type="button">Log out</button>
    </section>
  </main>

  <footer><a href="../index.html">Back to BAGASS Championship</a></footer>

  <script src="admin.js"></script>
</body>
</html>
